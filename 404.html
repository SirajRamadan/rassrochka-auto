<!doctype html>

<meta charset="utf-8">
<script>
  // Redirect SPA routes via sessionStorage trick
  var seg = window.location.pathname.replace('/rassrochka-auto','') || '/';
  sessionStorage.setItem('spa_redirect', seg + window.location.search);
  window.location.href = '/rassrochka-auto/';
</script>
</head>

</html>
